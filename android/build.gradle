// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // Build directory dentro dist/ del progetto.
    // Nota: il progetto NON e' piu' in OneDrive (ora in C:\dev\InitiativeTracker)
    // quindi i lock di OneDrive non sono piu' un problema. Tenere la build in
    // dist/ tiene tutti gli artefatti (EXE + APK) nella stessa cartella.
    // Path assoluto per evitare ambiguita' fra root e sub-project.
    buildDir = new File(rootProject.projectDir, "../dist/android-build/${project.name}").canonicalFile
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
