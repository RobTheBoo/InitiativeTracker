<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>🎭 RPG Initiative Tracker - Stanze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="theme-light.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="theme-toggle.js"></script>
  <style>
    .room-selector-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .room-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .room-header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--accent-gold);
    }

    .server-info {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-gold);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 30px;
      text-align: center;
    }

    .server-ip {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-gold);
      font-family: 'Courier New', monospace;
    }

    .server-label {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .qr-code {
      margin: 20px auto;
      max-width: 200px;
      padding: 10px;
      background: white;
      border-radius: 10px;
    }

    .create-room-section {
      background: var(--bg-light);
      border: 2px solid var(--border-gold);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .create-room-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .room-name-input {
      flex: 1;
      font-size: 1rem;
      padding: 12px 15px;
      background: var(--bg-dark);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      color: var(--text-light);
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .room-card {
      background: var(--bg-light);
      border: 2px solid var(--border-gold);
      border-radius: 10px;
      padding: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .room-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
    }

    .room-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .room-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
      margin-bottom: 5px;
    }

    .room-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .room-status.waiting {
      background: #555;
      color: #fff;
    }

    .room-status.active {
      background: var(--accent-green);
      color: var(--bg-dark);
    }

    .room-status.completed {
      background: var(--accent-red);
      color: white;
    }

    .room-info {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 5px 0;
    }

    .room-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="master-view">
  <div class="rpg-theme-toggle-slot" data-theme-toggle-into></div>
  <div class="room-selector-container">
    <div class="room-header">
      <h1>🎭 RPG Initiative Tracker</h1>
      <p class="subtitle">Gestione Stanze di Combattimento</p>
      <!-- Pulsante Configurazione unificato -->
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
        <button id="config-btn" onclick="openConfig()" class="btn secondary">
          ⚙️ Configurazione
        </button>
        <button id="data-path-btn" onclick="showDataPath()" class="btn secondary" style="display: none;">
          📁 Mostra Percorso Dati
        </button>
      </div>
    </div>

    <!-- Info Server: IP + QR code per onboarding rapido dei telefoni -->
    <div class="server-info">
      <div style="display: flex; gap: 30px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <div style="text-align: center;">
          <div class="server-label">I giocatori si connettono a:</div>
          <div class="server-ip" id="server-ip">http://localhost:3001</div>
          <div id="server-ip-alt" style="margin-top: 6px; font-size: 0.85rem; color: var(--text-dim); font-family: 'Courier New', monospace;"></div>
          <div style="margin-top: 8px; font-size: 0.8rem; color: var(--text-dim);">
            oppure cerca <code style="color: var(--accent-gold);">rpg-tracker.local</code> dal browser
          </div>
          <div id="server-error" style="display:none; color: #ff6b6b; margin-top: 10px; font-size: 0.9rem;"></div>
        </div>
        <div style="text-align: center;">
          <div class="server-label" style="margin-bottom: 8px;">Inquadra col telefono</div>
          <div id="qr-container" style="background: var(--accent-gold); padding: 8px; border-radius: 12px; display: inline-block; line-height: 0;">
            <img id="qr-image" alt="QR code di connessione" style="display: block; width: 180px; height: 180px; border-radius: 6px;" />
          </div>
        </div>
      </div>
    </div>

    <!-- Crea Nuova Stanza -->
    <div class="create-room-section">
      <h2>Crea Nuova Stanza</h2>
      <div class="create-room-form">
        <input type="text" 
               id="room-name-input" 
               class="room-name-input" 
               placeholder="Nome della stanza (es: Dungeon dei Goblin)"
               maxlength="50">
        <button id="create-room-btn" class="btn large success">
          ➕ Crea Stanza
        </button>
      </div>
    </div>

    <!-- Lista Stanze -->
    <div id="rooms-container">
      <h2 style="margin-bottom: 20px;">Le Tue Stanze</h2>
      <div id="rooms-grid" class="rooms-grid">
        <!-- Generato da JavaScript -->
      </div>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-state-icon">📋</div>
        <h3>Nessuna stanza creata</h3>
        <p>Crea la tua prima stanza per iniziare!</p>
      </div>
    </div>
  </div>

  <script src="room-selector.js"></script>
</body>
</html>
